// Handle duplicate files in processResources
processResources {
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE

    // Exclusions are configured below via tasks.named('processResources') as well.
}

// Some environments have src/main/resources/web owned by root (unreadable). Gradle 8+ fails state
// tracking when a Copy/ProcessResources task has unreadable inputs, so we explicitly disable
// state tracking and exclude that directory for non-8.3 builds (8.1 config UI doesn't need it).
tasks.named('processResources') {
    if (!buildForIgnitionVersion.startsWith('8.3')) {
        // Historically, some environments had src/main/resources/web owned by root (unreadable).
        // If web/ is unreadable, exclude it to avoid Gradle state tracking failures.
        def webDir = file('src/main/resources/web')
        if (!webDir.exists() || !webDir.canRead()) {
            doNotTrackState("Avoid unreadable src/main/resources/web during 8.1 module builds.")
            exclude('web/**')
        }
    }
}

// Convenience wrappers so users can build both artifacts without memorizing flags.
// These run as separate nested builds, keeping 8.1 and 8.3 outputs isolated.
tasks.register('buildModule81', GradleBuild) {
    group = 'build'
    description = 'Build the Ignition 8.1.x .modl artifact (zerobus-connector-<ver>.modl).'
    tasks = ['clean', 'buildModule']
    startParameter.projectProperties.put('ignitionHome', '/usr/local/ignition81')
    startParameter.projectProperties.put('buildForIgnitionVersion', '8.1.51')
    startParameter.projectProperties.put('minIgnitionVersion', '8.1.0')
    // Propagate moduleId override into the nested build (if provided to the outer build).
    startParameter.projectProperties.put('moduleId', moduleId)
}

tasks.register('buildModule83', GradleBuild) {
    group = 'build'
    description = 'Build the Ignition 8.3.x .modl artifact (zerobus-connector-<ver>-ignition-8.3.modl).'
    tasks = ['clean', 'buildModule']
    startParameter.projectProperties.put('ignitionHome', '/usr/local/ignition')
    startParameter.projectProperties.put('buildForIgnitionVersion', '8.3.2')
    startParameter.projectProperties.put('minIgnitionVersion', '8.3.0')
    // Propagate moduleId override into the nested build (if provided to the outer build).
    startParameter.projectProperties.put('moduleId', moduleId)
}

// -----------------------------------------------------------------------------
// Module signing (optional)
//
// Ignition requires third-party modules to be signed for distribution.
// This project intentionally does NOT hardcode any signing secrets or paths.
//
// Provide signing configuration via Gradle properties or environment variables:
// -PmoduleSignerJar=/path/to/module-signer.jar   (or env MODULE_SIGNER_JAR)
// -PsigningKeystore=/path/to/keystore.jks       (or env SIGNING_KEYSTORE)
// -PsigningKeystorePassword=...                 (or env SIGNING_STOREPASS)
// -PsigningAlias=...                            (or env SIGNING_ALIAS)
// -PsigningAliasPassword=...                    (or env SIGNING_KEYPASS)
// Optional:
// -PsigningChain=/path/to/chain.p7b             (or env SIGNING_CHAIN)
//
// The signer produces a new file next to the unsigned module with "-signed" suffix.
// -----------------------------------------------------------------------------
def moduleSignerJar = project.hasProperty('moduleSignerJar')
        ? project.getProperty('moduleSignerJar')
        : (System.getenv('MODULE_SIGNER_JAR') ?: '')

def signingKeystore = project.hasProperty('signingKeystore')
        ? project.getProperty('signingKeystore')
        : (System.getenv('SIGNING_KEYSTORE') ?: '')

def signingKeystorePassword = project.hasProperty('signingKeystorePassword')
        ? project.getProperty('signingKeystorePassword')
        : (System.getenv('SIGNING_STOREPASS') ?: '')

def signingAlias = project.hasProperty('signingAlias')
        ? project.getProperty('signingAlias')
        : (System.getenv('SIGNING_ALIAS') ?: '')

def signingAliasPassword = project.hasProperty('signingAliasPassword')
        ? project.getProperty('signingAliasPassword')
        : (System.getenv('SIGNING_KEYPASS') ?: '')

def signingChain = project.hasProperty('signingChain')
        ? project.getProperty('signingChain')
        : (System.getenv('SIGNING_CHAIN') ?: '')

tasks.register('signModule', JavaExec) {
    group = 'build'
    description = 'Signs the built .modl using Inductive Automation module-signer.jar (requires signing properties).'
    dependsOn buildModule

    // Run module-signer.jar as a tool; use the Gradle JVM (JDK 17 toolchain is fine for the signer tool).
    mainClass = '-jar'
    classpath = files()

    doFirst {
        // Validate signing config FIRST (doFirst actions run in LIFO order, so keep this as the only doFirst).
        def missing = []
        if (!moduleSignerJar) missing << "moduleSignerJar (or env MODULE_SIGNER_JAR)"
        if (!signingKeystore) missing << "signingKeystore (or env SIGNING_KEYSTORE)"
        if (!signingKeystorePassword) missing << "signingKeystorePassword (or env SIGNING_STOREPASS)"
        if (!signingAlias) missing << "signingAlias (or env SIGNING_ALIAS)"
        if (!signingAliasPassword) missing << "signingAliasPassword (or env SIGNING_KEYPASS)"

        if (!missing.isEmpty()) {
            throw new RuntimeException(
                    "Missing signing configuration:\n- " + missing.join("\n- ") + "\n\n" +
                            "Download module-signer.jar per IA docs and then run, for example:\n" +
                            "  ./gradlew signModule -PmoduleSignerJar=/path/to/module-signer.jar \\\n" +
                            "    -PsigningKeystore=/path/to/keystore.jks -PsigningKeystorePassword=... \\\n" +
                            "    -PsigningAlias=... -PsigningAliasPassword=...\n"
            )
        }
        if (!file(moduleSignerJar).exists()) {
            throw new RuntimeException("moduleSignerJar not found: ${moduleSignerJar}")
        }
        if (!file(signingKeystore).exists()) {
            throw new RuntimeException("signingKeystore not found: ${signingKeystore}")
        }
        if (signingChain && !file(signingChain).exists()) {
            throw new RuntimeException("signingChain not found: ${signingChain}")
        }

        def inFile = buildModule.archiveFile.get().asFile
        def outFileName = inFile.name.replaceFirst(/\\.modl$/, '') + "-signed.modl"
        def outFile = new File(inFile.parentFile, outFileName)
        // Expose paths so we can copy the signed artifact into repo-level releases/ in doLast.
        ext.unsignedModlFile = inFile
        ext.signedModlFile = outFile

        def argsList = [
                file(moduleSignerJar).absolutePath,
                "-keystore=${file(signingKeystore).absolutePath}",
                "-keystore-pwd=${signingKeystorePassword}",
                "-alias=${signingAlias}",
                "-alias-pwd=${signingAliasPassword}"
        ]
        if (signingChain) {
            argsList << "-chain=${file(signingChain).absolutePath}"
        }
        argsList << "-module-in=${inFile.absolutePath}"
        argsList << "-module-out=${outFile.absolutePath}"

        args = argsList
        println "Signing module:\n  in : ${inFile}\n  out: ${outFile}"
    }

    doLast {
        def outFile = ext.has('signedModlFile') ? ext.signedModlFile : null
        if (outFile == null || !outFile.exists()) {
            throw new RuntimeException("Signed module was not produced (expected at: ${outFile}).")
        }

        // Copy to repo-level releases folder (repoRoot/release/).
        def releasesDir = file("${project.projectDir}/../releases")
        releasesDir.mkdirs()
        copy {
            from outFile
            into releasesDir
        }
        println "✅ Signed module copied to: ${new File(releasesDir, outFile.name)}"
    }
}

// Convenience wrappers to build+sign 8.1 and 8.3 artifacts via nested builds.
tasks.register('signModule81', GradleBuild) {
    group = 'build'
    description = 'Builds and signs the Ignition 8.1.x .modl artifact (requires signing properties).'
    tasks = ['clean', 'buildModule', 'signModule']
    startParameter.projectProperties.put('ignitionHome', '/usr/local/ignition81')
    startParameter.projectProperties.put('buildForIgnitionVersion', '8.1.51')
    startParameter.projectProperties.put('minIgnitionVersion', '8.1.0')
    startParameter.projectProperties.put('moduleId', moduleId)

    // Propagate signing configuration into the nested build.
    if (moduleSignerJar) startParameter.projectProperties.put('moduleSignerJar', moduleSignerJar)
    if (signingKeystore) startParameter.projectProperties.put('signingKeystore', signingKeystore)
    if (signingKeystorePassword) startParameter.projectProperties.put('signingKeystorePassword', signingKeystorePassword)
    if (signingAlias) startParameter.projectProperties.put('signingAlias', signingAlias)
    if (signingAliasPassword) startParameter.projectProperties.put('signingAliasPassword', signingAliasPassword)
    if (signingChain) startParameter.projectProperties.put('signingChain', signingChain)
}

tasks.register('signModule83', GradleBuild) {
    group = 'build'
    description = 'Builds and signs the Ignition 8.3.x .modl artifact (requires signing properties).'
    tasks = ['clean', 'buildModule', 'signModule']
    startParameter.projectProperties.put('ignitionHome', '/usr/local/ignition')
    startParameter.projectProperties.put('buildForIgnitionVersion', '8.3.2')
    startParameter.projectProperties.put('minIgnitionVersion', '8.3.0')
    startParameter.projectProperties.put('moduleId', moduleId)

    // Propagate signing configuration into the nested build.
    if (moduleSignerJar) startParameter.projectProperties.put('moduleSignerJar', moduleSignerJar)
    if (signingKeystore) startParameter.projectProperties.put('signingKeystore', signingKeystore)
    if (signingKeystorePassword) startParameter.projectProperties.put('signingKeystorePassword', signingKeystorePassword)
    if (signingAlias) startParameter.projectProperties.put('signingAlias', signingAlias)
    if (signingAliasPassword) startParameter.projectProperties.put('signingAliasPassword', signingAliasPassword)
    if (signingChain) startParameter.projectProperties.put('signingChain', signingChain)
}

// // Make processResources depend on frontend build
// processResources {
//     dependsOn copyFrontendToResources
// }
// 
// // Default build includes module
// defaultTasks 'buildModule'
// 
