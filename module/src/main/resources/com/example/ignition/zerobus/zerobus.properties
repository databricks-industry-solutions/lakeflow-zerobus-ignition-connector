# Zerobus Connector Gateway Config UI - Internationalization (i18n) Strings
# These labels appear in the Ignition Gateway web interface

# Navigation Menu
Zerobus.nav.header=Zerobus Connector
Zerobus.nav.settings.title=Zerobus Configuration
Zerobus.nav.settings.panelTitle=Zerobus Connector Configuration
Zerobus.nav.diagnostics.title=Zerobus Diagnostics

# Field Labels - Module Control
ZerobusSettings.Enabled.Name=Module Enabled
ZerobusSettings.Enabled.Desc=Enable or disable the Zerobus connector module
ZerobusSettings.DebugLogging.Name=Debug Logging
ZerobusSettings.DebugLogging.Desc=Enable verbose debug logging for troubleshooting

# Field Labels - Databricks Connection
ZerobusSettings.WorkspaceUrl.Name=Workspace URL
ZerobusSettings.WorkspaceUrl.Desc=Databricks workspace URL (e.g., https://workspace.cloud.databricks.com)
ZerobusSettings.ZerobusEndpoint.Name=Zerobus Endpoint
ZerobusSettings.ZerobusEndpoint.Desc=Zerobus ingest endpoint (e.g., workspaceId.zerobus.region.cloud.databricks.com)
ZerobusSettings.OauthClientId.Name=OAuth Client ID
ZerobusSettings.OauthClientId.Desc=Service principal client ID for authentication
ZerobusSettings.OauthClientSecret.Name=OAuth Client Secret
ZerobusSettings.OauthClientSecret.Desc=Service principal client secret (stored encrypted). Leave blank to keep the currently saved secret.

# Field Labels - Unity Catalog
ZerobusSettings.TargetTable.Name=Target Table
ZerobusSettings.TargetTable.Desc=Unity Catalog table in format: catalog.schema.table
ZerobusSettings.SourceSystemId.Name=Source System ID
ZerobusSettings.SourceSystemId.Desc=Identifier for this Ignition gateway (default: ignition-gateway)

# Field Labels - Tag Selection
ZerobusSettings.TagSelectionMode.Name=Tag Selection Mode
ZerobusSettings.TagSelectionMode.Desc=Mode for selecting tags: explicit, folder, or pattern
ZerobusSettings.TagFolderPath.Name=Tag Folder Path
ZerobusSettings.TagFolderPath.Desc=Folder path for 'folder' mode (e.g., [default]MyFolder)
ZerobusSettings.TagPathPattern.Name=Tag Path Pattern
ZerobusSettings.TagPathPattern.Desc=Regex pattern for 'pattern' mode
ZerobusSettings.ExplicitTagPaths.Name=Explicit Tag Paths
ZerobusSettings.ExplicitTagPaths.Desc=Comma-separated list of tag paths for 'explicit' mode
ZerobusSettings.IncludeSubfolders.Name=Include Subfolders
ZerobusSettings.IncludeSubfolders.Desc=Include subfolders when using 'folder' mode

# Field Labels - Performance & Batching
ZerobusSettings.BatchSize.Name=Batch Size
ZerobusSettings.BatchSize.Desc=Number of events to batch before sending (default: 200)
ZerobusSettings.BatchFlushIntervalMs.Name=Batch Flush Interval (ms)
ZerobusSettings.BatchFlushIntervalMs.Desc=Maximum time to wait before flushing batch in milliseconds (default: 500)
ZerobusSettings.MaxQueueSize.Name=Max Queue Size
ZerobusSettings.MaxQueueSize.Desc=Maximum events to queue in memory (default: 10000)
ZerobusSettings.MaxEventsPerSecond.Name=Max Events Per Second
ZerobusSettings.MaxEventsPerSecond.Desc=Rate limit for event processing (default: 10000)

# Field Labels - Reliability
ZerobusSettings.MaxRetries.Name=Max Retries
ZerobusSettings.MaxRetries.Desc=Maximum retry attempts for failed requests (default: 3)
ZerobusSettings.RetryBackoffMs.Name=Retry Backoff (ms)
ZerobusSettings.RetryBackoffMs.Desc=Initial backoff delay for retries in milliseconds (default: 1000)
ZerobusSettings.ConnectionTimeoutMs.Name=Connection Timeout (ms)
ZerobusSettings.ConnectionTimeoutMs.Desc=Connection timeout in milliseconds (default: 30000)
ZerobusSettings.RequestTimeoutMs.Name=Request Timeout (ms)
ZerobusSettings.RequestTimeoutMs.Desc=Request timeout in milliseconds (default: 60000)

# Field Labels - Data Mapping
ZerobusSettings.IncludeQuality.Name=Include Quality
ZerobusSettings.IncludeQuality.Desc=Include tag quality information in events
ZerobusSettings.OnlyOnChange.Name=Only On Change
ZerobusSettings.OnlyOnChange.Desc=Only send events when values change (not on every scan)
ZerobusSettings.NumericDeadband.Name=Numeric Deadband
ZerobusSettings.NumericDeadband.Desc=Minimum change threshold for numeric values (0.0 = send all changes)

# Category Names
ZerobusSettings.Category=Zerobus Connector Settings

