syntax = "proto3";

package com.example.ignition.zerobus.proto;

option java_package = "com.example.ignition.zerobus.proto";
option java_outer_classname = "OTEventProto";
option java_multiple_files = true;

/**
 * OTEvent - Operational Technology event message for Zerobus Ingest.
 *
 * IMPORTANT:
 * - This schema MUST align with the bronze Delta table schema used for ingest.
 * - Value/quality-ish fields use proto3 `optional` so default values (0/false/"")
 *   preserve presence and do not get treated as NULL by downstream mapping.
 */
message OTEvent {
  // Unique event identifier
  string event_id = 1;
  
  // Event timestamp (milliseconds since Unix epoch)
  // Maps to Delta TIMESTAMP type
  int64 event_time = 2;
  
  // Full Ignition tag path (e.g., "[default]TestSimulator/Sine0")
  string tag_path = 3;
  
  // Ignition tag provider name (e.g., "default")
  string tag_provider = 4;
  
  // Numeric tag value (for numeric tags)
  // `optional` preserves explicit 0.0 presence.
  optional double numeric_value = 5;
  
  // String tag value (for string tags)
  optional string string_value = 6;
  
  // Boolean tag value (for boolean tags)
  optional bool boolean_value = 7;
  
  // Quality indicator as string ("GOOD", "BAD", "UNCERTAIN")
  optional string quality = 8;
  
  // Numeric quality code from Ignition
  optional int32 quality_code = 9;
  
  // Source Ignition Gateway identifier
  string source_system = 10;
  
  // Ingestion timestamp (milliseconds since Unix epoch)
  // Set by client when event is captured
  int64 ingestion_timestamp = 11;
  
  // Original data type from Ignition tag
  string data_type = 12;
  
  // Alarm state if tag is in alarm (can be empty)
  optional string alarm_state = 13;
  
  // Alarm priority if applicable (can be 0)
  optional int32 alarm_priority = 14;

  // Whether this event was emitted through SDT compression path.
  optional bool sdt_compressed = 15;

  // SDT suppression percentage (0-100) at mapping time.
  optional double compression_ratio = 16;

  // Config said SDT mode was active for this event's tag.
  optional bool sdt_enabled = 17;

  // Serialized bytes for the sent batch this event belonged to.
  optional int64 batch_bytes_sent = 18;
}

