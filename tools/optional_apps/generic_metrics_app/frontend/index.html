<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zerobus Metrics Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>Zerobus Metrics Dashboard</h1>
          <p class="subtitle">Compact operational view (throughput, latency, compression)</p>
        </div>
        <div class="controls">
          <label for="minutes">Lookback (min)</label>
          <input id="minutes" type="number" min="1" max="1440" value="15" />
          <button id="refresh">Refresh</button>
        </div>
      </header>

      <section class="kpi-grid">
        <article class="kpi-card">
          <div class="kpi-label">Health</div>
          <div id="kpiHealth" class="kpi-value">-</div>
          <div id="kpiHealthDetail" class="kpi-sub">-</div>
        </article>
        <article class="kpi-card">
          <div class="kpi-label">Events / Min (latest)</div>
          <div id="kpiEventsPerMin" class="kpi-value">-</div>
          <div class="kpi-sub">from throughput window</div>
        </article>
        <article class="kpi-card">
          <div class="kpi-label">p99 Latency (ms)</div>
          <div id="kpiP99Latency" class="kpi-value">-</div>
          <div class="kpi-sub">latest bucket</div>
        </article>
        <article class="kpi-card">
          <div class="kpi-label">Avg Compression Ratio</div>
          <div id="kpiCompressionRatio" class="kpi-value">-</div>
          <div class="kpi-sub">latest bucket</div>
        </article>
      </section>

      <section class="chart-grid">
        <article class="panel">
          <h2>Throughput</h2>
          <div class="chart-wrap"><canvas id="throughputChart"></canvas></div>
        </article>
        <article class="panel">
          <h2>Latency</h2>
          <div class="chart-wrap"><canvas id="latencyChart"></canvas></div>
        </article>
        <article class="panel">
          <h2>Compression</h2>
          <div class="chart-wrap"><canvas id="compressionChart"></canvas></div>
        </article>
        <article class="panel">
          <h2>Latest Rows</h2>
          <div class="table-wrap">
            <table id="latestTable">
              <thead><tr id="latestHead"></tr></thead>
              <tbody id="latestBody"></tbody>
            </table>
          </div>
        </article>
      </section>

      <details class="raw-panel">
        <summary>Raw API payloads</summary>
        <div class="raw-grid">
          <pre id="health"></pre>
          <pre id="throughput"></pre>
          <pre id="latency"></pre>
          <pre id="compression"></pre>
        </div>
      </details>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
